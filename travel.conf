server {
    server_name travelmemory.sairamraavi.com;

    location /trip {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
    }

    location /hello {
        proxy_pass http://localhost:3001;
        proxy_set_header Host $host;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/travelmemory.sairamraavi.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/travelmemory.sairamraavi.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = travelmemory.sairamraavi.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name travelmemory.sairamraavi.com;
    return 404; # managed by Certbot


}